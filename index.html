<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>ETH WallStreet Manipulation</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-container">
<h1>ETH WallStreet Manipulation</h1>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('panel')">Panel</button>
  <button class="tab-btn" onclick="switchTab('search')">Buscador</button>
</div>

<div id="tab-panel">
  <div class="card">
    <div class="sec-title">Nuevo registro</div>
    <div class="form-row">
      <div class="field">
        <label>Fecha (dd/mm/aaaa)</label>
        <input id="f-fecha" placeholder="14/04/2025" maxlength="10" inputmode="numeric">
      </div>
      <div class="field">
        <label>Mínimo</label>
        <input id="f-min" type="number" placeholder="1750" step="any" inputmode="decimal">
      </div>
      <div class="field">
        <label>Máximo</label>
        <input id="f-max" type="number" placeholder="1900" step="any" inputmode="decimal">
      </div>
      <button class="add-btn" onclick="addEntry()">Agregar</button>
    </div>
    <div class="err" id="err"></div>
  </div>

  <div id="metrics-wrap" style="display:none">
    <div class="metrics">
      <div class="mc"><div class="mc-label">Amplitud prom. %</div><div class="mc-val" id="m-pct">—</div></div>
      <div class="mc"><div class="mc-label">Amplitud prom. nominal</div><div class="mc-val" id="m-nom">—</div></div>
      <div class="mc"><div class="mc-label">Días registrados</div><div class="mc-val" id="m-days">0</div></div>
      <div class="mc"><div class="mc-label">Días con alertas</div><div class="mc-val danger" id="m-alrt">0</div></div>
    </div>
  </div>

  <div class="card" id="chart-wrap" style="display:none">
    <div class="sec-title">Gráfico de velas</div>
    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="goPage(-1)">← Ant.</button>
      <span class="nav-info" id="nav-info"></span>
      <button class="nav-btn" id="btn-next" onclick="goPage(1)">Sig. →</button>
    </div>
    <svg class="candle-svg" id="csvg" viewBox="0 0 540 280" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="legend">
      <span><svg width="12" height="12"><rect x="1" y="1" width="10" height="10" fill="#1D9E75" rx="2"/></svg>Sin alerta</span>
      <span><svg width="12" height="12"><rect x="1" y="1" width="10" height="10" fill="#D85A30" rx="2"/></svg>Con alerta</span>
      <span><svg width="28" height="12"><line x1="0" y1="6" x2="28" y2="6" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="4,3"/></svg>Nivel 1800</span>
      <span><svg width="28" height="12"><line x1="0" y1="6" x2="28" y2="6" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="4,3"/></svg>Nivel 2500</span>
    </div>
  </div>

  <div class="card" id="table-wrap" style="display:none">
    <div class="sec-title-row">
      <div class="sec-title">Historial</div>
      <button class="clear-btn" onclick="clearAll()">Borrar todo</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Fecha</th><th>Mín</th><th>Máx</th>
          <th>Amp. nom.</th><th>Amp. %</th><th>Alertas</th><th></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="tab-search" style="display:none">
  <div class="card">
    <div class="sec-title">Cotejar precio</div>
    <div class="form-row">
      <div class="field">
        <label>Valor a buscar</label>
        <input id="s-val" type="number" placeholder="Ej: 1850" step="any" inputmode="decimal" style="width:200px">
      </div>
      <button class="add-btn" onclick="searchLevel()">Buscar coincidencias</button>
    </div>
  </div>

  <div class="card" id="search-results-wrap" style="display:none">
    <div class="sec-title">Resultados encontrados</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Fecha</th><th>Mín</th><th>Máx</th>
          <th>Amp. %</th><th>Alertas</th>
        </tr></thead>
        <tbody id="s-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
